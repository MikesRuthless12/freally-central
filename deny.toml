# cargo-deny configuration (FC-00e). Gates advisories, licenses, bans, and sources.
# Run: cargo deny check

[graph]
targets = [
  "x86_64-pc-windows-msvc",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
  "x86_64-unknown-linux-gnu",
]
all-features = true

[advisories]
version = 2
# Transitive-only "unmaintained"/notice advisories pulled in by Tauri v2 on Linux
# (gtk3/glib/webkit bindings) and its build-time macros. There is no maintained
# replacement yet; none are exploitable vulnerabilities. Re-review when Tauri
# moves off GTK3.
ignore = [
  "RUSTSEC-2024-0370",
  "RUSTSEC-2024-0411",
  "RUSTSEC-2024-0412",
  "RUSTSEC-2024-0413",
  "RUSTSEC-2024-0414",
  "RUSTSEC-2024-0415",
  "RUSTSEC-2024-0416",
  "RUSTSEC-2024-0417",
  "RUSTSEC-2024-0418",
  "RUSTSEC-2024-0419",
  "RUSTSEC-2024-0420",
  "RUSTSEC-2025-0075",
  "RUSTSEC-2025-0080",
  "RUSTSEC-2025-0081",
  "RUSTSEC-2025-0098",
  "RUSTSEC-2025-0100",
]

[licenses]
version = 2
confidence-threshold = 0.9
# The app crate itself is proprietary (All Rights Reserved) and never published
# to crates.io, so skip the SPDX check for our own workspace crate.
private = { ignore = true }
unused-allowed-license = "allow"
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
