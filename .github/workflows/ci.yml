name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      # Phase 0 has no crate yet; these checks activate automatically once
      # Phase 1 (FC-01) scaffolds the Rust core / src-tauri crate.
      - name: Detect Rust project
        id: detect
        shell: bash
        run: |
          if [ -f Cargo.toml ] || [ -f src-tauri/Cargo.toml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Cargo.toml yet — Rust checks skipped until Phase 1 scaffolds the crate."
          fi

      - name: Install Linux build deps (Tauri)
        if: steps.detect.outputs.present == 'true' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # rustup reads rust-toolchain.toml and installs the pinned channel + components.
      - name: Install pinned Rust toolchain
        if: steps.detect.outputs.present == 'true'
        shell: bash
        run: rustup show active-toolchain || rustup toolchain install

      - name: Cache cargo
        if: steps.detect.outputs.present == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Format
        if: steps.detect.outputs.present == 'true'
        run: cargo fmt --all --check

      - name: Clippy
        if: steps.detect.outputs.present == 'true'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        if: steps.detect.outputs.present == 'true'
        run: cargo test --all --all-features

      - name: cargo-deny
        if: steps.detect.outputs.present == 'true'
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  ui:
    name: UI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      # Phase 0 has no UI yet; these checks activate automatically once
      # Phase 1 (FC-01/FC-05) scaffolds ui/.
      - name: Detect UI project
        id: detect
        shell: bash
        run: |
          if [ -f ui/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No ui/package.json yet — UI checks skipped until Phase 1 scaffolds the UI."
          fi

      - name: Setup Node
        if: steps.detect.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install
        if: steps.detect.outputs.present == 'true'
        working-directory: ui
        run: npm ci

      - name: Typecheck
        if: steps.detect.outputs.present == 'true'
        working-directory: ui
        run: npm run typecheck

      - name: Lint
        if: steps.detect.outputs.present == 'true'
        working-directory: ui
        run: npm run lint

      - name: Test
        if: steps.detect.outputs.present == 'true'
        working-directory: ui
        run: npm run test

      - name: i18n parity lint (18 locales)
        if: steps.detect.outputs.present == 'true'
        working-directory: ui
        run: npm run i18n:lint

      - name: Install Playwright browsers
        if: steps.detect.outputs.present == 'true'
        working-directory: ui
        run: npx playwright install --with-deps

      - name: e2e (Playwright)
        if: steps.detect.outputs.present == 'true'
        working-directory: ui
        run: npm run test:e2e

  # Single required status check for branch protection. Requiring this one gate
  # (instead of every matrix leg by name) keeps protection stable as the matrix evolves.
  ci-success:
    name: CI Success
    if: always()
    needs: [rust, ui]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          echo "rust: ${{ needs.rust.result }}"
          echo "ui:   ${{ needs.ui.result }}"
          if [ "${{ needs.rust.result }}" != "success" ] || [ "${{ needs.ui.result }}" != "success" ]; then
            echo "::error::One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
