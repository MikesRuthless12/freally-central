name: Release

# A version-tag push builds + signs the Tauri installers for all three OSes,
# publishes a GitHub Release, and writes the signed latest.json updater endpoint.
# Mirrors Freally Capture's release workflow (FC-00c).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   TAURI_SIGNING_PRIVATE_KEY           - updater signing key (from `tauri signer generate`)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  - password for that key
# Optional (platform code-signing / notarization — recommended before public release):
#   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
#   APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID   (macOS)
#   Windows Authenticode is configured in src-tauri/tauri.conf.json.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Release (${{ matrix.platform }} ${{ matrix.args }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-latest
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # The app is scaffolded in Phase 1; fail fast with a clear message if a tag
      # is pushed before then, rather than emitting a confusing build error.
      - name: Preflight — Tauri app must exist
        shell: bash
        run: |
          if [ ! -f src-tauri/tauri.conf.json ]; then
            echo "::error::No Tauri app yet (src-tauri/tauri.conf.json missing). The release pipeline activates after Phase 1 (FC-01)."
            exit 1
          fi

      - name: Install Linux build deps (Tauri)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install pinned Rust toolchain
        shell: bash
        run: rustup show active-toolchain || rustup toolchain install

      - name: Add macOS targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      # tauri-action runs `npm run tauri build` from the repo root, so the root
      # @tauri-apps/cli (the `tauri` binary) must be installed — not just ui/ deps.
      - name: Install root deps (Tauri CLI)
        run: npm ci

      - name: Install UI deps
        working-directory: ui
        run: npm ci

      - name: Build, sign & publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Freally Central ${{ github.ref_name }}"
          releaseBody: "Signed installers for Windows, macOS, and Linux are attached below."
          # Draft first so a human publishes deliberately; flip to false to auto-publish.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          includeUpdaterJson: true
