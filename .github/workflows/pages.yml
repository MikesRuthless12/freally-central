name: Pages

# Publishes the docs/ site AND serves the catalog manifest at a stable URL:
#   https://mikesruthless12.github.io/freally-central/               (landing/docs)
#   https://mikesruthless12.github.io/freally-central/freally-central.json  (manifest)
# catalog/freally-central.json stays the single source of truth; it is copied into
# the published site root at deploy time (FC-00d).

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "catalog/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r docs/. _site/
          cp catalog/freally-central.json _site/freally-central.json

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
